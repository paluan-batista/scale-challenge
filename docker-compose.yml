services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scale}
      POSTGRES_USER: ${POSTGRES_USER:-scale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scale-local-only}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--maxmemory", "128mb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  api:
    build:
      context: .
      target: api
    environment:
      API_ADDR: :8080
      DATABASE_URL: postgresql://${POSTGRES_USER:-scale}:${POSTGRES_PASSWORD:-scale-local-only}@postgres:5432/${POSTGRES_DB:-scale}?sslmode=disable
      REDIS_ADDR: redis:6379
    ports:
      - "127.0.0.1:${API_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/api", "healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  worker:
    build:
      context: .
      target: worker
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scale}:${POSTGRES_PASSWORD:-scale-local-only}@postgres:5432/${POSTGRES_DB:-scale}?sslmode=disable
      REDIS_ADDR: redis:6379
      WORKER_BATCH_SIZE: ${WORKER_BATCH_SIZE:-32}
      WORKER_BLOCK_TIMEOUT: ${WORKER_BLOCK_TIMEOUT:-1s}
      WORKER_PENDING_IDLE_TIMEOUT: ${WORKER_PENDING_IDLE_TIMEOUT:-30s}
      WORKER_RETRY_LIMIT: ${WORKER_RETRY_LIMIT:-3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "/app/worker", "healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M

  prometheus:
    image: prom/prometheus:v3.13.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  grafana:
    image: grafana/grafana:12.2.10
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-development-grafana-only}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scale}:${POSTGRES_PASSWORD:-scale-local-only}@postgres:5432/${POSTGRES_DB:-scale}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy

  seed:
    build:
      context: .
      target: seed
    profiles: ["tools"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-scale}:${POSTGRES_PASSWORD:-scale-local-only}@postgres:5432/${POSTGRES_DB:-scale}?sslmode=disable
      SEED_API_KEY: ${SEED_API_KEY:-development-seed-key}
    depends_on:
      migrate:
        condition: service_completed_successfully
  simulator:
    build:
      context: .
      target: simulator
    profiles: ["simulator"]
    command: ["--base-url", "http://api:8080", "--scenario", "/app/testdata/scenarios/happy-path.json", "--seed", "42"]
    depends_on:
      api:
        condition: service_healthy

  test:
    build:
      context: .
      target: test
    command: make verify
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
