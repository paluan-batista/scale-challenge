openapi: 3.1.0
info:
  title: Grain weighing registrations API
  version: 0.7.0
paths:
  /health/live:
    get:
      summary: Process liveness probe
      responses: { '200': { description: Process is running } }
  /health/ready:
    get:
      summary: Dependency readiness probe
      responses: { '200': { description: PostgreSQL and Redis are reachable }, '503': { description: A required dependency is unavailable } }
  /metrics:
    get:
      summary: Prometheus operational metrics
      responses: { '200': { description: Prometheus text exposition } }
  /v1/scale-readings:
    post:
      summary: Authenticate a scale and enqueue a reading in Redis Streams
      parameters:
        - in: header
          name: Authorization
          required: true
          schema: { type: string, example: "Bearer device-key" }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [event_id, scale_id, plate, weight_grams, measured_at]
              properties:
                event_id: { type: string, format: uuid }
                scale_id: { type: string }
                plate: { type: string, description: Normalized to seven uppercase alphanumeric characters }
                weight_grams: { type: integer, format: int64, minimum: 1 }
                measured_at: { type: string, format: date-time }
      responses:
        '202': { description: Redis confirmed XADD to scale-readings }
        '400': { description: Malformed or oversized JSON body }
        '401': { description: Missing or invalid device key }
        '403': { description: Disabled scale or scale/device-key mismatch }
        '422': { description: Business-invalid reading }
        '503': { description: Redis unavailable }
  /v1/branches:
    get: { summary: List branches, responses: { '200': { description: OK } } }
    post: { summary: Create branch, responses: { '201': { description: Created }, '422': { description: Validation error } } }
  /v1/branches/{id}:
    get: { summary: Get branch, responses: { '200': { description: OK }, '404': { description: Not found } } }
    put: { summary: Update active branch, responses: { '200': { description: OK } } }
  /v1/branches/{id}/deactivate:
    post: { summary: Safely deactivate branch, responses: { '200': { description: OK } } }
  /v1/scales:
    get: { summary: List scales, responses: { '200': { description: OK } } }
    post: { summary: Create scale; api_key is stored only as api_key_hash, responses: { '201': { description: Created } } }
  /v1/scales/{id}: { get: { summary: Get scale, responses: { '200': { description: OK } } }, put: { summary: Update scale, responses: { '200': { description: OK } } } }
  /v1/scales/{id}/deactivate: { post: { summary: Safely deactivate scale, responses: { '200': { description: OK } } } }
  /v1/trucks:
    get: { summary: List trucks, responses: { '200': { description: OK } } }
    post: { summary: Create truck with normalized unique plate and integer tare grams, responses: { '201': { description: Created }, '409': { description: Duplicate plate } } }
  /v1/trucks/{id}: { get: { summary: Get truck, responses: { '200': { description: OK } } }, put: { summary: Update truck, responses: { '200': { description: OK } } } }
  /v1/trucks/{id}/deactivate: { post: { summary: Safely deactivate truck, responses: { '200': { description: OK } } } }
  /v1/grain-types:
    get: { summary: List grain types, responses: { '200': { description: OK } } }
    post: { summary: Create grain type using purchase_price_minor, responses: { '201': { description: Created } } }
  /v1/grain-types/{id}: { get: { summary: Get grain type, responses: { '200': { description: OK } } }, put: { summary: Update grain type, responses: { '200': { description: OK } } } }
  /v1/grain-types/{id}/deactivate: { post: { summary: Safely deactivate grain type, responses: { '200': { description: OK } } } }
  /v1/transport-transactions:
    get: { summary: List transport transactions, responses: { '200': { description: OK } } }
    post: { summary: Open transport transaction with price and margin snapshots, responses: { '201': { description: Created }, '409': { description: Existing OPEN transaction } } }
  /v1/transport-transactions/{id}: { get: { summary: Get transport transaction, responses: { '200': { description: OK } } } }
  /v1/transport-transactions/{id}/status:
    patch: { summary: Cancel an OPEN transaction; WEIGHED is reserved for finalization, responses: { '200': { description: Cancelled }, '409': { description: Invalid transition } } }
  /v1/reports/weighings:
    get:
      summary: Aggregate finalized weighings by branch and grain type
      parameters:
        - { in: query, name: branch_id, schema: { type: string, example: "branch-001" } }
        - { in: query, name: grain_type_id, schema: { type: string, example: "grain-001" } }
        - { in: query, name: start, schema: { type: string, format: date-time, example: "2026-07-01T00:00:00Z" } }
        - { in: query, name: end, schema: { type: string, format: date-time, example: "2026-07-31T23:59:59Z" } }
      responses:
        '200':
          description: Finalized-only aggregate report; an empty range has zero totals and an empty items list
          content:
            application/json:
              example:
                totals: { net_weight_grams: 2000000000, total_cost_minor: 250000, average_purchase_price_minor: 125000, average_applied_margin_bps: 1250, completed_transport_count: 1 }
                items:
                  - { branch_id: "branch-001", branch_code: "BR", grain_type_id: "grain-001", grain_type_code: "SOY", net_weight_grams: 2000000000, total_cost_minor: 250000, average_purchase_price_minor: 125000, average_applied_margin_bps: 1250, completed_transport_count: 1 }
        '422': { description: start is later than end or a date value is invalid }
